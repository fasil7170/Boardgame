apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardgame
  namespace: webapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boardgame
  template:
    metadata:
      labels:
        app: boardgame
    spec:
      containers:
      - name: boardgame
        image: fazil2664/boardshack:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: boardgame
  namespace: webapps
spec:
  selector:
    app: boardgame
  ports:
  - port: 80
    targetPort: 8080
  type: NodePort
